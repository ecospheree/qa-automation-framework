name: QA Automation

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main

jobs:
  automation-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Execute Web Tests
        run: ./gradlew webTest

      - name: Execute API Tests
        run: ./gradlew apiTest